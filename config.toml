base_url = "https://blog.sheerluck.dev"
title = "Mrsheerluck Blog"
description = "Personal notes on engineering, systems, and software."
default_language = "en"
theme = "terminimal"

# Sass compilation is required for the theme.
compile_sass = true
generate_feeds = true
feed_filenames = ["rss.xml", "atom.xml"]
build_search_index = false

taxonomies = [
    { name = "tags", feed = true },
    { name = "series", feed = true },
]

[markdown]

[markdown.highlighting]
theme = "catppuccin-mocha"

[extra]
accent_color = "blue"
background_color = "dark"
logo_text = "mrsheerluck.blog"
author = "Mrsheerluck"
page_titles = "combined"
enable_post_view_navigation = true
post_view_navigation_prompt = "Thanks for reading. Continue exploring?"
katex = true
# KaTeX version used by the theme when `extra.katex = true`.
katex_version = "0.16.11"

music_player_enabled = true
music_player_shuffle = true
music_player_persist_navigation = true
music_player_tracks = [
    { title = "Episode 77: Phonaut", artist = "Phonaut", mp3_url = "https://datashat.net/music_for_programming_77-phonaut.mp3", page_url = "https://musicforprogramming.net/seventyseven/" },
    { title = "Episode 76: Material Object", artist = "Material Object", mp3_url = "https://datashat.net/music_for_programming_76-material_object.mp3", page_url = "https://musicforprogramming.net/seventysix/" },
    { title = "Episode 75: Datassette", artist = "Datassette", mp3_url = "https://datashat.net/music_for_programming_75-datassette.mp3", page_url = "https://musicforprogramming.net/seventyfive/" },
]
music_player_credit_html = 'Music For Programming — <a href="https://musicforprogramming.net/" target="_blank" rel="noopener noreferrer">musicforprogramming.net</a> (not affiliated).'

subscribe_widget_enabled = true
subscribe_widget_iframe_url = "https://mrsheerluck.substack.com/embed"
subscribe_widget_subscribe_url = "https://mrsheerluck.substack.com/subscribe"

support_github_sponsors_url = "https://github.com/sponsors/MrSheerluck"
support_kofi_url = "https://ko-fi.com/mrsheerluck"

menu_items = [
    { name = "home", url = "$BASE_URL" },
    { name = "posts", url = "$BASE_URL/posts" },
    { name = "series", url = "$BASE_URL/series" },
    { name = "tags", url = "$BASE_URL/tags" },
    { name = "archive", url = "$BASE_URL/archive" },
    { name = "about", url = "$BASE_URL/about" },
    { name = "support", url = "$BASE_URL/support" },
    { name = "rss", url = "$BASE_URL/rss.xml" },
    { name = "subscribe", url = "https://mrsheerluck.substack.com/subscribe", newtab = true },
]
